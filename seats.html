<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Select your preferred seats from the bus layout. Interactive seat selection with real-time availability.">
  <title>Select Seats – Nilambari Travels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar" id="navbar"></header>

  <!-- Main Content -->
  <main class="page">
    <div class="container container--medium">
      <!-- Breadcrumb -->
      <div id="breadcrumb"></div>

      <!-- Stepper -->
      <div id="stepper"></div>

      <!-- Page Header -->
      <div class="page-header">
        <h1 class="page-header__title" id="bus-name">Select Your Seats</h1>
        <p class="page-header__subtitle" id="bus-info"></p>
      </div>

      <!-- Seat Grid -->
      <div class="glass-card seat-grid-wrapper">
        <div style="text-align:center; margin-bottom:var(--space-md); font-size:0.85rem; color:var(--text-muted);">
          🚌 Front
        </div>

        <div class="seat-grid" id="seat-grid"></div>

        <div style="text-align:center; margin-top:var(--space-md); font-size:0.85rem; color:var(--text-muted);">
          Back
        </div>

        <!-- Legend -->
        <div class="seat-legend">
          <div class="seat-legend__item">
            <div class="seat-legend__color seat-legend__color--available"></div>
            Available
          </div>
          <div class="seat-legend__item">
            <div class="seat-legend__color seat-legend__color--selected"></div>
            Selected
          </div>
          <div class="seat-legend__item">
            <div class="seat-legend__color seat-legend__color--booked"></div>
            Booked
          </div>
          <div class="seat-legend__item">
            <div class="seat-legend__color seat-legend__color--locked"></div>
            Locked
          </div>
        </div>

        <!-- Selected Seats Summary -->
        <div class="selected-seats-summary" id="seats-summary" style="display:none;">
          <div class="selected-seats-summary__title">Selected Seats:</div>
          <div class="selected-seats-summary__seats" id="selected-seats-tags"></div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div style="display:flex; gap:var(--space-md); margin-top:var(--space-xl); flex-wrap:wrap;">
        <a href="results.html" class="btn btn--secondary" style="flex:1; min-width:150px;">← Back to Results</a>
        <button class="btn btn--primary" style="flex:2; min-width:200px;" id="proceed-btn" disabled>
          Proceed to Booking →
        </button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer" id="footer"></footer>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script>
    let selectedSeats = [];
    let externallyLockedSeats = [];
    let socket;
    let busId;
    let travelDate;

    document.addEventListener('DOMContentLoaded', () => {
      initPageCommon('');

      // Breadcrumb
      document.getElementById('breadcrumb').innerHTML = renderBreadcrumb([
        { label: 'Home', href: 'index.html' },
        { label: 'Results', href: 'results.html' },
        { label: 'Select Seats' }
      ]);

      // Stepper
      document.getElementById('stepper').innerHTML = renderStepper(3);

      // Check if bus is selected
      const bus = AppState.selectedBus;
      if (!bus || !AppState.searchParams || !AppState.searchParams.date) {
        showToast('No bus/date selected. Please search first.', 'error');
        setTimeout(() => window.location.href = 'index.html', 1500);
        return;
      }

      busId = bus._id;
      travelDate = AppState.searchParams.date;

      // Header
      document.getElementById('bus-name').textContent = bus.bus.name;
      document.getElementById('bus-info').textContent =
        `${bus.bus.type} • ${bus.departure} — ${bus.arrival} • ₹${bus.bus.price}/seat`;

      const backendUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
        ? 'http://localhost:5000/seats' 
        : '/seats';
      socket = io(backendUrl);

      socket.on('connect', () => {
        socket.emit('join-bus', { busId, date: travelDate });
      });

      socket.on('seats-status', ({ lockedSeats }) => {
        externallyLockedSeats = lockedSeats.map(l => l.seat);
        renderSeatGrid(bus);
      });

      socket.on('seat-locked', ({ seat }) => {
        if (!externallyLockedSeats.includes(seat)) {
          externallyLockedSeats.push(seat);
          updateSeatUI(seat, 'locked');
        }
      });

      socket.on('seat-released', ({ seat }) => {
        externallyLockedSeats = externallyLockedSeats.filter(s => s !== seat);
        updateSeatUI(seat, 'available');
      });

      socket.on('seat-booked', ({ seats }) => {
        seats.forEach(seat => {
          if (!bus.bookedSeats.includes(seat)) {
            bus.bookedSeats.push(seat);
          }
          externallyLockedSeats = externallyLockedSeats.filter(s => s !== seat);
          updateSeatUI(seat, 'booked');
        });
        AppState.save();
      });

      socket.on('seat-lock-success', ({ seat }) => {
        if (selectedSeats.length >= 6) {
          showToast('You can select a maximum of 6 seats', 'error');
          socket.emit('deselect-seat', { busId, date: travelDate, seat });
          updateSeatUI(seat, 'available');
          return;
        }
        selectedSeats.push(seat);
        updateSeatUI(seat, 'selected');
        updateSeatsSummary();
      });

      socket.on('seat-lock-failed', ({ seat, message }) => {
        showToast(message || 'Failed to lock seat', 'error');
        if (!externallyLockedSeats.includes(seat)) {
           externallyLockedSeats.push(seat);
        }
        updateSeatUI(seat, 'locked');
      });

      const prevSelected = AppState.selectedSeats || [];
      selectedSeats = [];
      
      renderSeatGrid(bus, true);

      if (prevSelected.length > 0) {
         const interval = setInterval(() => {
            if (socket.connected) {
               prevSelected.forEach(seatNum => {
                 toggleSeat(seatNum);
               });
               clearInterval(interval);
            }
         }, 100);
      }

      document.getElementById('proceed-btn').addEventListener('click', () => {
        if (selectedSeats.length === 0) {
          showToast('Please select at least one seat', 'error');
          return;
        }
        AppState.selectedSeats = selectedSeats;
        AppState.save();
        window.location.href = 'booking.html';
      });

      window.addEventListener('beforeunload', () => {
        socket.emit('leave-bus', { busId, date: travelDate });
      });
    });

    function renderSeatGrid(bus, isInitial = false) {
      const seatGrid = document.getElementById('seat-grid');
      seatGrid.innerHTML = '';
      
      let seatNum = 1;
      const totalSeats = bus.bus.totalSeats;
      const rows = Math.ceil(totalSeats / 4); // 4 usable seats per row (5 cols, 1 aisle)
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < 5; col++) {
          if (col === 2) {
            const aisle = document.createElement('div');
            aisle.className = 'aisle';
            seatGrid.appendChild(aisle);
            continue;
          }

          if (seatNum > totalSeats) {
            const empty = document.createElement('div');
            seatGrid.appendChild(empty);
            seatNum++;
            continue;
          }

          const seatEl = document.createElement('button');
          seatEl.className = 'seat';
          seatEl.textContent = seatNum;
          seatEl.dataset.seat = seatNum;
          seatEl.id = `seat-${seatNum}`;

          if (bus.bookedSeats.includes(seatNum)) {
            seatEl.classList.add('seat--booked');
            seatEl.title = `Seat ${seatNum} - Booked`;
            seatEl.disabled = true;
          } else if (externallyLockedSeats.includes(seatNum)) {
            seatEl.classList.add('seat--locked');
            seatEl.title = `Seat ${seatNum} - Locked`;
            seatEl.disabled = true;
          } else {
            if (selectedSeats.includes(seatNum)) {
              seatEl.classList.add('seat--selected');
            }
            seatEl.title = `Seat ${seatNum} - Available`;
            const currentSeat = seatNum;
            seatEl.addEventListener('click', () => toggleSeat(currentSeat));
          }

          if (isInitial) {
             seatEl.disabled = true; 
             seatEl.style.opacity = '0.5';
          }

          seatGrid.appendChild(seatEl);
          seatNum++;
        }
      }

      if (!isInitial) updateSeatsSummary();
    }

    function toggleSeat(seatNum) {
      const index = selectedSeats.indexOf(seatNum);
      const seatEl = document.getElementById(`seat-${seatNum}`);
      
      if (index > -1) {
        selectedSeats.splice(index, 1);
        updateSeatUI(seatNum, 'available');
        updateSeatsSummary();
        socket.emit('deselect-seat', { busId, date: travelDate, seat: seatNum });
      } else {
        if (selectedSeats.length >= 6) {
          showToast('You can select a maximum of 6 seats', 'error');
          return;
        }
        if (seatEl) {
           seatEl.classList.add('seat--loading');
           seatEl.disabled = true;
        }
        socket.emit('select-seat', { busId, date: travelDate, seat: seatNum });
      }
    }

    function updateSeatUI(seatNum, state) {
      const seatEl = document.getElementById(`seat-${seatNum}`);
      if (!seatEl) return;
      
      seatEl.classList.remove('seat--selected', 'seat--booked', 'seat--locked', 'seat--loading');
      seatEl.disabled = false;
      seatEl.style.opacity = '1';
      
      if (state === 'selected') {
        seatEl.classList.add('seat--selected');
        seatEl.title = `Seat ${seatNum} - Selected`;
      } else if (state === 'booked') {
        seatEl.classList.add('seat--booked');
        seatEl.title = `Seat ${seatNum} - Booked`;
        seatEl.disabled = true;
      } else if (state === 'locked') {
        seatEl.classList.add('seat--locked');
        seatEl.title = `Seat ${seatNum} - Locked`;
        seatEl.disabled = true;
      } else if (state === 'available') {
        seatEl.title = `Seat ${seatNum} - Available`;
      }
    }

    function updateSeatsSummary() {
      const summary = document.getElementById('seats-summary');
      const tags = document.getElementById('selected-seats-tags');
      const proceedBtn = document.getElementById('proceed-btn');

      if (selectedSeats.length > 0) {
        summary.style.display = 'block';
        tags.innerHTML = selectedSeats
          .sort((a, b) => a - b)
          .map(s => `<span class="selected-seat-tag">Seat ${s}</span>`)
          .join('');
        proceedBtn.disabled = false;
      } else {
        summary.style.display = 'none';
        proceedBtn.disabled = true;
      }
    }
  </script>
</body>
</html>
